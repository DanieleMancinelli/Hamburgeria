<div class="order-card">
  <h2>📋 Ordini in Cucina</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Prodotti</th>
        <th>Totale</th>
        <th>Stato</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ordine of ordini">
        <td>#{{ ordine.id }}</td>
        <td><strong>{{ ordine.dettagli }}</strong></td>
        <td>{{ ordine.totale }} €</td>
        <td>
          <span class="status-badge" [ngClass]="ordine.stato.replace(' ', '-')">
            {{ ordine.stato }}
          </span>
        </td>
        <td>
          <button class="btn-start" (click)="cambiaStato(ordine.id, 'in preparazione')" *ngIf="ordine.stato === 'in attesa'">CUCINA</button>
          <button class="btn-done" (click)="cambiaStato(ordine.id, 'completato')" *ngIf="ordine.stato !== 'completato'">PRONTO</button>
        </td>
      </tr>
    </tbody>
  </table>
  <div *ngIf="ordini.length === 0" style="text-align: center; padding: 20px;">
    Nessun ordine presente al momento.
  </div>
</div>
