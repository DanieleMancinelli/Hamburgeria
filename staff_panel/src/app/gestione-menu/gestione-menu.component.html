<div class="form-card">
  <h3>➕ Aggiungi Prodotto</h3>
  <div class="grid-form">
    <div class="input-group">
      <label>Nome</label>
      <input [(ngModel)]="nuovoProdotto.nome" placeholder="es. Bacon Burger">
    </div>
    <div class="input-group">
      <label>Prezzo (€)</label>
      <input [(ngModel)]="nuovoProdotto.prezzo" type="number" step="0.5">
    </div>
    <div class="input-group">
      <label>Categoria</label>
      <select [(ngModel)]="nuovoProdotto.categoria">
        <option value="panini">Panini</option>
        <option value="bevande">Bevande</option>
        <option value="contorni">Contorni</option>
      </select>
    </div>
    <div class="input-group">
      <label>URL Immagine</label>
      <input [(ngModel)]="nuovoProdotto.immagine_url" placeholder="http://...">
    </div>
    <button class="btn-add" (click)="aggiungi()">AGGIUNGI AL MENU</button>
  </div>
</div>

<div class="order-card">
  <h3>🍔 Menu Attuale</h3>
  <table>
    <thead>
      <tr>
        <th>Foto</th>
        <th>Nome</th>
        <th>Prezzo</th>
        <th>Categoria</th>
        <th>Azioni</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of prodotti">
        <td><img [src]="p.immagine_url || 'https://via.placeholder.com/60'" class="product-img"></td>
        <td><strong>{{ p.nome }}</strong></td>
        <td>{{ p.prezzo }} €</td>
        <td>{{ p.categoria }}</td>
        <td><button class="btn-delete" (click)="elimina(p.id)">ELIMINA</button></td>
      </tr>
    </tbody>
  </table>
</div>
