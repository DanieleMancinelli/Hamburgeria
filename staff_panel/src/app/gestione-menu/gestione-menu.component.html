<h2>Gestione Menù</h2>

<div style="background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
  <h3>Aggiungi Nuovo Prodotto</h3>
  <input [(ngModel)]="nuovoProdotto.nome" placeholder="Nome prodotto" type="text">
  <input [(ngModel)]="nuovoProdotto.prezzo" placeholder="Prezzo" type="number">
  <select [(ngModel)]="nuovoProdotto.categoria">
    <option value="panini">Panini</option>
    <option value="bevande">Bevande</option>
    <option value="contorni">Contorni</option>
  </select>
  <button (click)="aggiungi()">Aggiungi Prodotto</button>
</div>

<hr>

<h3>Lista Prodotti Attuali</h3>
<table border="1" style="width: 100%; border-collapse: collapse;">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Prezzo</th>
      <th>Categoria</th>
      <th>Azioni</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of prodotti">
      <td>{{ p.nome }}</td>
      <td>{{ p.prezzo }} €</td>
      <td>{{ p.categoria }}</td>
      <td>
        <button (click)="elimina(p.id)" style="color: red;">Elimina</button>
      </td>
    </tr>
  </tbody>
</table>
